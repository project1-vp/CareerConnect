<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CareerConnect | Register</title>
<link rel="stylesheet" href="ui-premium.css">
<script src="ui-premium.js" defer></script>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;}
.auth-wrap{width:min(980px,100%);display:grid;grid-template-columns:1fr 1fr;background:var(--prem-card);border:1px solid var(--prem-line);border-radius:22px;overflow:hidden;box-shadow:0 16px 36px rgba(18,36,58,.14);} 
.side{padding:34px;background:linear-gradient(160deg,rgba(59,130,246,.14),rgba(245,158,11,.18));display:flex;flex-direction:column;justify-content:space-between;}
.side h1{margin:0;color:#14304e;font-size:2rem;line-height:1.05;}
.side p{margin:14px 0 0;color:var(--prem-muted);max-width:34ch;}
.pill{display:inline-flex;padding:9px 14px;border-radius:999px;border:1px solid var(--prem-line);text-decoration:none;color:var(--prem-text);font-weight:600;background:#fff;}
.form{padding:32px;display:flex;flex-direction:column;}
.form h2{margin:0 0 6px;color:#153454;}
.sub{margin:0 0 18px;color:var(--prem-muted);font-size:.94rem;}
.field{margin-bottom:12px;}
.field label{display:block;margin-bottom:6px;color:var(--prem-muted);font-size:.86rem;}
.field input,.field select{width:100%;padding:11px;border-radius:10px;border:1px solid var(--prem-line);background:#fff;color:#153454;outline:none;}
.field input:focus,.field select:focus{border-color:var(--prem-accent);box-shadow:0 0 0 3px rgba(59,130,246,.15);} 
.btn{margin-top:6px;padding:11px;border:0;border-radius:12px;background:linear-gradient(120deg,var(--prem-accent),var(--prem-accent2));color:#fff;font-weight:700;cursor:pointer;}
.meta{margin-top:14px;font-size:.88rem;color:var(--prem-muted);} 
.meta a{color:#1e5d95;text-decoration:none;font-weight:600;}
.loader{display:none;margin:14px auto;border:3px solid rgba(30,93,149,.2);border-top:3px solid #1e5d95;border-radius:50%;width:24px;height:24px;animation:spin 1s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}
@media (max-width:900px){.auth-wrap{grid-template-columns:1fr;}.side{display:none;}}
</style>
</head>
<body>
<div class="auth-wrap">
  <aside class="side">
    <div>
      <a class="pill" href="home.html">Back to Home</a>
      <h1 style="margin-top:18px;">Create your CareerConnect account</h1>
      <p>Join as a job seeker or recruiter and get access to a premium dashboard experience.</p>
    </div>
    <p style="font-size:.85rem;">Fast onboarding for hiring and application tracking.</p>
  </aside>

  <section class="form">
    <h2>Register</h2>
    <p class="sub">Complete details to activate your account.</p>

    <form id="registerForm">
      <div class="field"><label for="name">Full Name</label><input type="text" id="name" required></div>
      <div class="field"><label for="email">Email</label><input type="email" id="email" required></div>
      <div class="field"><label for="password">Password</label><input type="password" id="password" required></div>
      <div class="field"><label for="confirmPassword">Confirm Password</label><input type="password" id="confirmPassword" required></div>
      <div class="field"><label for="role">Role</label><select id="role" required><option value="">Select Role</option><option value="job seeker">Job Seeker</option><option value="recruiter">Recruiter</option></select></div>
      <button type="submit" id="registerBtn" class="btn">Create Account</button>
      <div class="loader" id="loader"></div>
    </form>

    <p class="meta">Already registered? <a href="login.html">Login now</a></p>
  </section>
</div>

<script>
function showToast(message, options = {}){
  const { type = "default", icon: iconSymbol, style = {}, duration = 4500 } = options;
  const rootId = "cc-toast-root";
  let root = document.getElementById(rootId);
  if(!root){
    root = document.createElement("div");
    root.id = rootId;
    Object.assign(root.style,{position:"fixed",top:"18px",left:"50%",transform:"translateX(-50%)",zIndex:"9999",width:"min(380px, calc(100vw - 24px))",pointerEvents:"none"});
    document.body.appendChild(root);
  }
  const toastCard = document.createElement("div");
  const isSuccess = type === "success";
  const isError = type === "error";
  const background = style.background || (isSuccess ? "linear-gradient(135deg, rgba(16,185,129,0.96), rgba(14,165,233,0.96))" : isError ? "linear-gradient(135deg, rgba(249,115,22,0.96), rgba(244,63,94,0.96))" : "linear-gradient(135deg, rgba(51,65,85,0.96), rgba(30,41,59,0.96))");
  Object.assign(toastCard.style,{padding:"9px 12px",borderRadius:"12px",color:style.color || "#fff",background,border:"1px solid rgba(255,255,255,0.16)",backdropFilter:"blur(10px)",boxShadow:"0 12px 28px rgba(0,0,0,.33)",fontSize:"13px",fontWeight:"600",lineHeight:"1.35",display:"flex",alignItems:"center",gap:"8px",opacity:"0",transform:"translateY(-14px) scale(.98)",transition:"opacity .24s ease, transform .24s ease"});
  Object.assign(toastCard.style, style);
  const iconEl = document.createElement("span");
  iconEl.textContent = iconSymbol || (isSuccess ? "OK" : isError ? "!" : "i");
  Object.assign(iconEl.style,{width:"18px",height:"18px",borderRadius:"999px",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"800",color:"#fff",background:"rgba(0,0,0,0.22)"});
  const msg = document.createElement("span");
  msg.textContent = message || "Something went wrong";
  toastCard.append(iconEl, msg);
  root.replaceChildren(toastCard);
  clearTimeout(root._toastTimer);
  requestAnimationFrame(() => { toastCard.style.opacity = "1"; toastCard.style.transform = "translateY(0) scale(1)"; });
  root._toastTimer = setTimeout(() => { toastCard.style.opacity = "0"; toastCard.style.transform = "translateY(-12px) scale(.98)"; setTimeout(() => root.replaceChildren(), 260); }, duration);
}
function toast(message, options = {}){ showToast(message, options); }
toast.success = (message, options = {}) => showToast(message, { ...options, type: "success" });
toast.error = (message, options = {}) => showToast(message, { ...options, type: "error" });

document.getElementById("registerForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const loader = document.getElementById("loader");
  const button = document.getElementById("registerBtn");
  loader.style.display = "block";
  button.style.display = "none";

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const role = document.getElementById("role").value;

  if(password !== confirmPassword){
    toast.error("Passwords do not match.");
    loader.style.display = "none";
    button.style.display = "block";
    return;
  }

  try{
    const response = await fetch("http://localhost:4000/api/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ name, email, password, role })
    });

    const data = await response.json();
    loader.style.display = "none";
    button.style.display = "block";

    if(!response.ok){ toast.error(data.message || "Registration failed."); return; }
    toast.success(data.message || "Registration completed.");
    if(data.message === "Registration Successful"){
      (window.smoothNavigate ? smoothNavigate("login.html") : (window.location.href = "login.html"));
    }
  }catch(_error){
    loader.style.display = "none";
    button.style.display = "block";
    toast.error("Failed to connect to server.");
  }
});
</script>
</body>
</html>
